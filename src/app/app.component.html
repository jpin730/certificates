<div class="bg-light d-flex flex-column justify-content-between min-vh-100">
  <nav class="navbar bg-dark" [style.height]="'40px'"></nav>

  <main class="flex-grow-1 container">
    <h1 class="text-center my-4">Jaime Pineda's Certificates</h1>

    <app-instructions />

    <app-category-selector
      [categories]="categories"
      (categoryChange)="selectedCategory = $event"
    />

    @for (certificate of certificates$ | async; track certificate.id) {
      @if (
        certificate.category === selectedCategory || selectedCategory === 'All'
      ) {
        <p>{{ certificate.id }}</p>
      }
    }
  </main>

  <app-footer />
</div>
