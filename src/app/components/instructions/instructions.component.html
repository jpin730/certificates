<div class="container mb-4">
  @if (showAlert) {
    <div class="alert alert-info alert-dismissible text-center">
      Click or tap on image to enlarge
      <button
        type="button"
        class="btn-close"
        (click)="showAlert = false"
      ></button>
    </div>
  }
</div>
